  output: `VIA CERTIFIED MAIL — RETURN RECEIPT REQUESTED
 
April 28, 2025

**RE: DEMAND FOR SETTLEMENT**
**Claimant: Maria Elena Rodriguez**
**Date of Loss: March 15, 2025**
**Our File: MRR-2025-047**
 
Dear Mr. Huang:
 
This firm represents Maria Elena Rodriguez in connection with the serious personal injuries she sustained on March 15, 2025, as a direct and proximate result of the negligence of your insured, Thomas C. Whitfield. We write to demand full and fair compensation for Ms. Rodriguez's injuries, damages, and losses as set forth herein.
 
**I. LIABILITY**
 
On March 15, 2025 at 2:47 PM, Ms. Rodriguez was lawfully stopped at a red traffic signal at the intersection of Old Georgetown Road and Democracy Boulevard, Bethesda, Maryland. Your insured, operating his vehicle at an estimated 35 miles per hour, struck Ms. Rodriguez's 2021 Honda Accord from the rear with no warning and no opportunity for evasion.
 
Liability is not in dispute. Your insured was issued a citation for failure to stop for a steady red signal in violation of Maryland Transportation Article §21-202. The collision was captured in part by a traffic monitoring camera. Witness statements from two bystanders confirm that Ms. Rodriguez's vehicle was stationary at impact.
 
**II. INJURIES AND MEDICAL TREATMENT**
 
The force of the collision caused Ms. Rodriguez to sustain significant spinal injuries that have permanently altered her quality of life.
 
*Emergency Treatment (March 15, 2025):* Ms. Rodriguez was transported via ambulance to Suburban Hospital, Bethesda, where she presented with acute cervical and lumbar pain, left leg numbness, and headache. Initial imaging was obtained. She was discharged with instructions to follow up with a spine specialist.
 
*Diagnostic Imaging (April 2, 2025):* MRI of the lumbar spine confirmed a disc herniation at L4-L5 with left-sided nerve root compression and radiculopathy. MRI of the cervical spine demonstrated disc bulging at C5-C6 with associated foraminal narrowing.
 
*Orthopedic and Neurosurgical Care:* Ms. Rodriguez has been under the care of Dr. Anika Patel, M.D., board-certified neurosurgeon at MedStar Georgetown University Hospital. Dr. Patel has administered epidural steroid injections at L4-L5, providing temporary but insufficient relief. Conservative management has been exhausted.
 
**III. PROGNOSIS AND FUTURE TREATMENT**
 
Dr. Patel has recommended L4-L5 microdiscectomy surgery, which is medically necessary and causally related to this accident. Dr. Patel has further assigned Ms. Rodriguez a permanent partial impairment rating of 8% to the lumbar spine. Post-operative rehabilitation is expected to require physical therapy three times per week for a minimum of six months.
 
**IV. ECONOMIC DAMAGES**
 
| Category | Amount |
|---|---|
| Emergency transport and hospital | $8,240 |
| Diagnostic imaging (MRI, X-ray) | $4,800 |
| Neurosurgical consultations and injections | $12,700 |

| **Total Medical Damages** | **$91,740** |
| Lost wages (14 weeks @ $1,014/wk) | $14,200 |
| **Total Economic Damages** | **$105,940** |
 
**V. GENERAL DAMAGES**
 
Ms. Rodriguez, 38 years of age, is a dental hygienist and mother of three children ages 6, 9, and 12. Prior to this accident, she was an active, healthy individual who coached her son's soccer team and maintained an active household. Since the accident, Ms. Rodriguez has been unable to perform household tasks, engage in recreational activities, or participate in her children's lives in the manner she previously enjoyed. She experiences chronic left leg pain and numbness that interrupts her sleep and has caused significant anxiety and depression.
 
The pain and suffering Ms. Rodriguez has endured — and will continue to endure through surgery and recovery — is substantial. General damages, including pain and suffering, loss of enjoyment of life, and emotional distress, are conservatively valued at no less than **$225,000**, representing a reasonable multiplier applied to her economic losses.
 
**VI. SETTLEMENT DEMAND**
 
The total value of Ms. Rodriguez's claim, inclusive of all economic damages, past and future medical expenses, lost wages, and general damages, is **$330,940**.
 
We demand settlement in the amount of **$285,000** to resolve this matter in its entirety. This demand shall remain open for thirty (30) days from the date of this letter.
 
Should State Farm fail to respond reasonably to this demand, we are fully prepared to file suit in the Circuit Court for Montgomery County and present this case to a jury of Ms. Rodriguez's peers.
 
Very truly yours,
 
**Counsel for Claimant Maria Elena Rodriguez**`

// ─── Typewriter ───────────────────────────────────────────────────────────────
function useTypewriter(target, speed=14) {
  const [displayed, setDisplayed] = useState("");
  const idx = useRef(0);
  const timer = useRef(null);
  useEffect(()=>{
    idx.current=0; setDisplayed(""); clearInterval(timer.current);
    if(!target) return;
    timer.current = setInterval(()=>{
      idx.current += speed;
      if(idx.current >= target.length){ setDisplayed(target); clearInterval(timer.current); }
      else setDisplayed(target.slice(0,idx.current));
    }, 16);
    return ()=>clearInterval(timer.current);
  },[target]);
  return displayed;
}
 
// ─── Markdown renderer ────────────────────────────────────────────────────────
function MarkdownText({text}){
  if(!text) return null;
  const lines = text.split("\n");
  return (
    <div>
      {lines.map((line,i)=>{
        if(!line.trim()) return <div key={i} style={{height:8}}/>;
 
        // Table rows
        if(line.startsWith("|")) {
          const cells = line.split("|").filter((_,ci)=>ci>0 && ci<line.split("|").length-1);
          const isHeader = lines[i+1]?.match(/^\|[-|: ]+\|$/);
          const isSep    = line.match(/^\|[-|: ]+\|$/);
          if(isSep) return null;
          return (
            <div key={i} style={{display:"flex",borderBottom:"1px solid #e8e2d8",background:isHeader?"#f8fafc":"#fff"}}>
              {cells.map((cell,ci)=>(
                <div key={ci} style={{flex:1,padding:"7px 12px",fontSize:13,color:"#334155",fontWeight:isHeader?700:400,borderRight:"1px solid #e8e2d8"}}>
                  {cell.trim()}
                </div>
              ))}
            </div>
          );
        }
 
        // Bold section headers **text**
        if(line.match(/^\*\*[^*]+\*\*$/) && !line.includes(" — ") && line.length < 80) {
          const t = line.replace(/\*\*/g,"");
          return <div key={i} style={{fontSize:13,fontWeight:700,color:"#0b1628",letterSpacing:".03em",marginTop:18,marginBottom:6,paddingBottom:4,borderBottom:"1px solid #e8e2d8"}}>{t}</div>;
        }
 
        // Checkbox items ☐
        if(line.startsWith("☐")) {
          return <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",margin:"3px 0"}}>
            <span style={{color:TEAL,flexShrink:0}}>☐</span>
            <span style={{fontSize:13,color:"#334155",lineHeight:1.65}} dangerouslySetInnerHTML={{__html:line.slice(1).replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")}}/>
          </div>;
        }
 
        // ⚠️ flags
        if(line.startsWith("⚠️")) {
          return <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",margin:"5px 0",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:5,padding:"6px 10px"}}>
            <span style={{flexShrink:0}}>⚠️</span>
            <span style={{fontSize:13,color:"#92400e",lineHeight:1.65}} dangerouslySetInnerHTML={{__html:line.slice(2).replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")}}/>
          </div>;
        }
 
        // [KEY] markers
        const html = line
          .replace(/\*\*(.*?)\*\*/g,"<strong style='color:#1e293b;font-weight:700'>$1</strong>")
          .replace(/\*([^*]+)\*/g,"<em style='color:#334155'>$1</em>")
          .replace(/\[KEY\]/g,"<span style='background:#b8922a;color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;margin:0 3px'>KEY</span>")
          .replace(/\[CAUSATION LANGUAGE\]/g,"<span style='background:#0b1628;color:#00b89a;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;margin:0 3px'>CAUSATION</span>")
          .replace(/\[PERMANENCY LANGUAGE\]/g,"<span style='background:#0b1628;color:#818cf8;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;margin:0 3px'>PERMANENCY</span>")
          .replace(/\[KEY CAUSATION REBUTTAL\]/g,"<span style='background:#ef4444;color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;margin:0 3px'>REBUTTAL</span>");
 
        // Numbered items
        if(line.match(/^\d+\./)) {
          return <p key={i} style={{fontSize:13,lineHeight:1.75,color:"#334155",margin:"4px 0",paddingLeft:4}} dangerouslySetInnerHTML={{__html:html}}/>;
        }
 
        return <p key={i} style={{fontSize:13,lineHeight:1.75,color:"#334155",margin:"3px 0"}} dangerouslySetInnerHTML={{__html:html}}/>;
      })}
    </div>
  );
}

          <div style={{borderRight:"1px solid #e8e2d8",overflow:"auto",padding:"20px 24px",background:"#fff",display:"flex",flexDirection:"column",gap:14}}>
 
            {/* Case header */}
            <div style={{background:NAVY,borderRadius:8,padding:"14px 16px",marginBottom:2}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:".1em",color:TEAL,marginBottom:4}}>SAMPLE CASE</div>
              <div style={{fontSize:14,fontWeight:600,color:"#fff",lineHeight:1.4}}>
                {activeId==="demand"    && "Rodriguez v. Whitfield / State Farm"}
                {activeId==="medsum"   && "James T. Okafor — MVA Cervical/Shoulder"}
                {activeId==="depo"     && "Okafor v. GEICO — Dr. Harrison IME Depo"}
                {activeId==="settlement"&&"Rodriguez v. Whitfield — Settlement"}
                {activeId==="intake"   && "Darnell Washington — Slip & Fall Intake"}
                {activeId==="expert"   && "Rodriguez — Dr. Patel Expert Prep"}
              </div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:3}}>
                {activeId==="demand"    && "MVA · Bethesda MD · L4-L5 Herniation"}
                {activeId==="medsum"   && "MVA · DC · Cervical Disc + SLAP Tear"}
                {activeId==="depo"     && "MVA · DC · Defense IME Cross"}
                {activeId==="settlement"&&"MVA · Montgomery County MD · $300K policy"}
                {activeId==="intake"   && "Premises Liability · Chevy Chase MD"}
                {activeId==="expert"   && "MVA · Bethesda MD · Neurosurgeon Direct"}
              </div>
            </div>
 
            {/* Fields */}
            {Object.entries(demo.fields).map(([k,v])=>(
              <FieldDisplay
                key={k}
                label={k.replace(/([A-Z])/g," $1").replace(/^./,s=>s.toUpperCase())}
                value={v}
                multiline={v.length>80}
              />
            ))}
 
            {/* Generate button */}
            <button className="gb"
              onClick={generate}
              disabled={generating}
              style={{padding:"13px",borderRadius:7,border:"none",background:generating?"#94a3b8":TEAL,color:"#fff",fontSize:14,fontWeight:700,cursor:generating?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"background .15s",marginTop:4}}>
              {generating?(
                <><div style={{width:14,height:14,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>Generating…</>
              ):output?"Regenerate ↗":"Generate Draft ↗"}
            </button>
 
            {/* Access CTA */}
            <div style={{background:"#f8fafc",border:"1px solid #e2ddd5",borderLeft:`3px solid ${GOLD}`,borderRadius:6,padding:"12px 14px",fontSize:12,color:"#64748b",lineHeight:1.65}}>
              <strong style={{color:NAVY}}>Using your own cases?</strong><br/>
              Request early access to generate with your actual client facts.{" "}
              <a href="/#early-access" style={{color:TEAL,fontWeight:600,textDecoration:"none"}}>Request access →</a>
            </div>
          </div>
 
          {/* Right: Output */}
          <div style={{overflow:"hidden",display:"flex",flexDirection:"column",background:CREAM}}>
 
            {/* Output header */}
            <div style={{padding:"11px 22px",borderBottom:"1px solid #e2ddd5",display:"flex",alignItems:"center",justifyContent:"space-between",background:CREAM2,flexShrink:0}}>
              <div style={{fontSize:12,fontWeight:600,color:"#475569",letterSpacing:".06em",display:"flex",alignItems:"center",gap:8}}>
                OUTPUT
                {generating&&<span style={{fontSize:11,color:TEAL,fontWeight:400,animation:"pulse 1.2s ease-in-out infinite"}}>● Claude is writing…</span>}
                {output&&!generating&&<span style={{fontSize:11,color:"#22c55e",fontWeight:400}}>● Complete</span>}
              </div>
              <div style={{display:"flex",gap:8}}>
                {output&&!generating&&(
                  <>
                    <button className="cb" onClick={()=>{navigator.clipboard.writeText(output)}} style={{fontSize:12,fontWeight:600,color:"#475569",background:"transparent",border:"1px solid #ddd6cc",borderRadius:5,padding:"5px 12px",cursor:"pointer",transition:"background .12s",fontFamily:"inherit"}}>
                      Copy
                    </button>
                    <button className="cb" onClick={()=>setShowModal(true)} style={{fontSize:12,fontWeight:600,color:NAVY,background:GOLD,border:"none",borderRadius:5,padding:"5px 14px",cursor:"pointer",transition:"opacity .12s",fontFamily:"inherit"}}>
                      Use with my cases →
                    </button>
                  </>
                )}
              </div>
            </div>
 
            <div ref={outputRef} style={{flex:1,overflow:"auto",padding:"22px 26px"}}>
              {!output&&!generating?(
                <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",animation:"fadeUp .4s ease"}}>
                  <div style={{fontSize:48,marginBottom:18,opacity:.18}}>{tool.icon}</div>
                  <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:"#94a3b8",marginBottom:10}}>
                    See it in action.
                  </div>
                  <div style={{fontSize:14,color:"#cbd5e1",maxWidth:300,lineHeight:1.7,marginBottom:24}}>
                    The case facts are loaded. Hit Generate to watch Claude draft your {tool.label.toLowerCase()} in real time.
                  </div>
                  <button className="gb" onClick={generate}
                    style={{padding:"12px 28px",borderRadius:7,border:"none",background:TEAL,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    Generate Draft ↗
                  </button>
                </div>
              ):generating&&!output?(
                <div style={{display:"flex",alignItems:"center",gap:12,color:"#94a3b8",fontSize:14,padding:"48px 0"}}>
                  <div style={{width:18,height:18,border:"2px solid #e2ddd5",borderTopColor:TEAL,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
                  Claude is drafting your {tool.label.toLowerCase()}…
                </div>
              ):(
                <div style={{animation:"fadeUp .3s ease"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:18,paddingBottom:14,borderBottom:"1px solid #e8e2d8"}}>
                    <div style={{fontSize:10,fontWeight:600,letterSpacing:".1em",color:TEAL}}>CASEZERO COUNSEL</div>
                    <div style={{width:3,height:3,borderRadius:"50%",background:"#cbd5e1"}}/>
                    <div style={{fontSize:10,color:"#94a3b8"}}>{tool.label}</div>
                    <div style={{width:3,height:3,borderRadius:"50%",background:"#cbd5e1"}}/>
                    <div style={{fontSize:10,color:"#94a3b8"}}>Sample Demo · {new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                  </div>
 
                  <MarkdownText text={displayed}/>
 
                  {displayed.length<output.length&&(
                    <span style={{display:"inline-block",width:2,height:14,background:NAVY,animation:"pulse .8s ease-in-out infinite",verticalAlign:"middle",marginLeft:2}}/>
                  )}
 
                  {displayed===output&&output&&(
                    <>
                      <div style={{marginTop:24,padding:"14px 16px",background:"#fff",border:"1px solid #e8e2d8",borderLeft:`3px solid ${GOLD}`,borderRadius:6,fontSize:12,color:"#64748b",lineHeight:1.65}}>
                        <strong style={{color:NAVY}}>Demo output.</strong> This draft was generated from sample case data to demonstrate CaseZero Counsel's capabilities. Early access firms generate with their own cases. <a href="/#early-access" style={{color:TEAL,fontWeight:600,textDecoration:"none"}}>Request access →</a>
                      </div>
                      <div style={{marginTop:12,padding:"14px 16px",background:"rgba(11,22,40,.03)",border:"1px solid rgba(11,22,40,.08)",borderRadius:6,fontSize:11,color:"#94a3b8",lineHeight:1.6}}>
                        AI-generated draft. All output must be reviewed by a licensed attorney before use. Not legal advice.
                      </div>
                    </>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
 
window.addEventListener('DOMContentLoaded',function(){
  const el=document.getElementById('loading');
  if(el){el.style.opacity='0';setTimeout(()=>el.remove(),400);}
});
 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
